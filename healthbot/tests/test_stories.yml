version: "3.1"
stories:
- story: high confidence case
  steps:
  - user: |
      I have a fever, cough, and chest pain
    intent: ask_symptoms
  - action: action_dynamic_followup_question
  - slot_was_set:
    - triage_state: asking_age
  - user: |
      30
    intent: inform
  - action: action_handle_inform
  - slot_was_set:
    - triage_state: asking_duration
  - user: |
      4
    intent: inform
  - action: action_handle_inform
  - slot_was_set:
    - triage_state: asking_severity
  - user: |
      5
    intent: inform
  - action: action_handle_inform

- story: low confidence case
  steps:
  - user: |
      I have a mild headache
    intent: ask_symptoms
  - action: action_dynamic_followup_question
  - slot_was_set:
    - triage_state: asking_age
  - user: |
      25
    intent: inform
  - action: action_handle_inform
  - slot_was_set:
    - triage_state: asking_duration
  - user: |
      2
    intent: inform
  - action: action_handle_inform
  - slot_was_set:
    - triage_state: asking_severity
  - user: |
      2
    intent: inform
  - action: action_handle_inform

- story: emergency case
  steps:
  - user: |
      I have severe chest pain and I cannot breathe
    intent: ask_symptoms
  - action: action_dynamic_followup_question
  - slot_was_set:
    - emergency_detected: true

- story: emergency mid-flow
  steps:
  - user: |
      I have a mild fever
    intent: ask_symptoms
  - action: action_dynamic_followup_question
  - slot_was_set:
    - triage_state: asking_age
  - user: |
      I am having a heart attack
    intent: inform
  - action: action_handle_inform
  - slot_was_set:
    - emergency_detected: true

- story: age risk case
  steps:
  - user: |
      I have fatigue
    intent: ask_symptoms
  - action: action_dynamic_followup_question
  - slot_was_set:
    - triage_state: asking_age
  - user: |
      75
    intent: inform
  - action: action_handle_inform
  - slot_was_set:
    - triage_state: asking_duration

- story: duration risk case
  steps:
  - user: |
      I have a cough
    intent: ask_symptoms
  - action: action_dynamic_followup_question
  - slot_was_set:
    - triage_state: asking_age
  - user: |
      40
    intent: inform
  - action: action_handle_inform
  - slot_was_set:
    - triage_state: asking_duration
  - user: |
      20
    intent: inform
  - action: action_handle_inform
